# Fuzzel Configuration
# File: ~/.config/fuzzel/fuzzel.ini
# Launcher moderno per Niri con tema Dracula

[main]
# Terminal da usare per eseguire app che richiedono terminale
terminal=kitty
# Font da usare
font=JetBrainsMono Nerd Font:size=11
# Dimensioni della finestra (frazione dello schermo)
width=50
height=20
# Centra la finestra
horizontal-pad=0
vertical-pad=0
# Timeout per la ricerca inattiva (ms, 0 = disabilitato)
search-timeout-ms=200
# Numero di righe da mostrare prima di scrollare
lines=10
# Riquadro intorno i risultati
inner-pad=8
outer-pad=12
border-width=2
# Arrotondamento angoli (pixel)
corner-radius=12
# Distanza da cursore mouse prima di appiccicarvisi (pixel)
sticky-distance=10

[colors]
# Palette Dracula
background=282a36ff
foreground=f8f8f2ff
# Text highlight (selezione)
selection-match-background=44475aff
selection-match-foreground=f8f8f2ff
# Background selezione attiva
selection-background=bd93f9ff
selection-foreground=21222cff
# Testo nelle opzioni
text=f8f8f2ff
# Border
border=bd93f9ff

[border]
# Stile border
width=2
# Colore border (definito in [colors])
# color=bd93f9ff (già definito sopra)

[prompt]
# Prompt testuale (come zsh, fish, ecc)
# Puoi usare Unicode/Nerd Font icons
text= 
# Color per il prompt
# color=50fa7bff (verde per contrasto)

[placeholder]
# Testo di placeholder quando nessuna query
text=Search applications...
# Colore placeholder (più scuro)

[scrollbar]
# Larghezza scrollbar
width=0

[cursor]
# Stile cursore (blink, none)
style=blink
# Colore cursore
color=f8f8f2ff
