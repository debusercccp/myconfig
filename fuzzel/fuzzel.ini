# Fuzzel Configuration - Minimalist Nord Theme
# File: ~/.config/fuzzel/fuzzel.ini
# Per chi preferisce uno stile più clean e meno pesante

[main]
terminal=kitty
font=MonaspaceNeon Nerd Font:size=10
width=45
height=15
# Posizione (top = mostra in alto, near-cursor = vicino cursore)
# line-height=1.5
# Ricerca case-insensitive
match-mode=fuzzy
# Scroll con mouse e frecce
# enable-scroll=yes

[colors]
# Nord theme (alternativa a Dracula)
background=2e3440ff
foreground=eceff4ff
# Selection highlight (match)
selection-match-background=3b4252ff
selection-match-foreground=eceff4ff
# Selected item
selection-background=88c0d0ff
selection-foreground=2e3440ff
text=eceff4ff
border=81a1c1ff

[border]
width=1

[prompt]
# Icona minimale
text=
# Oppure: text=> 

[scrollbar]
width=0

[cursor]
style=none
