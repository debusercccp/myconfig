# Fuzzel Configuration
# File: ~/.config/fuzzel/fuzzel.ini
# Launcher moderno per Niri con tema Dracula

[main]
# Terminal da usare per eseguire app che richiedono terminale
terminal=kitty
# Font da usare
font=JetBrainsMono Nerd Font:size=10
# Larghezza della finestra (frazione dello schermo)
width=40
# Numero di righe da mostrare prima di scrollare (determina l'altezza)
lines=5

# Spaziatura interna complessiva
horizontal-pad=0
vertical-pad=0
inner-pad=8

# Prompt impostato come spazio singolo usando gli apici singoli
prompt=' '
placeholder=Search applications...

[colors]
# Palette Dracula standard (Formato: RRGGBBAA)
background=282a36ff
text=f8f8f2ff

# Stringa cercata sui risultati non selezionati
match=ff79c6ff

# Riga selezionata (Background e Testo)
selection=bd93f9ff
selection-text=21222cff

# Stringa cercata sulla riga selezionata
selection-match=44475aff

# Colore del bordo
border=bd93f9ff

# Colori degli elementi dell'interfaccia
prompt=50fa7bff
placeholder=6272a4ff
input=f8f8f2ff

[border]
width=2
radius=12
