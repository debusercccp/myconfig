# vim:ft=kitty
## name: T-Money (Fixed Focus Version)

# --- Impostazioni di Opacità e Trasparenza ---
# Impedisce a Kitty di variare l'opacità dinamicamente
dynamic_background_opacity no

# Sfondo totalmente opaco (cambia a 0.85 se vuoi trasparenza fissa)
background_opacity 0.90

# --- Fix per il cambio colore al focus ---
# Rende il testo identico quando la finestra NON è focalizzata
inactive_text_alpha 1.0

# Colori di sfondo per finestra attiva/inattiva (opzionale, per sicurezza)
# Se li lasci commentati userà il colore di background standard per entrambe
# active_background   #000000
# inactive_background #000000

#: Colori Base (Scommentati per essere letti correttamente)
foreground            #dddddd
background            #000000
selection_foreground  #000000
selection_background  #d1cdff

#: Colori dei bordi (opzionale, se vuoi vederli uguali)
active_border_color   #3300ff
inactive_border_color #3300ff

#: La palette standard (16 colori)
color0 #000000
color8 #767676
color1 #ff0022
color9 #ff0000
color2 #19cb00
color10 #23fd00
color3 #cecb00
color11 #fffd00
color4 #0026ff
color12 #1a8fff
color5 #7300ff
color13 #fd28ff
color6 #0dcdcd
color14 #14ffff
color7 #dddddd
color15 #ffffff
