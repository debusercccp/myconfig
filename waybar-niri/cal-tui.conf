# Config kitty dedicata alla finestra del calendario (app-id cal-tui).
# Eredita la kitty.conf principale (font, ecc.) e sovrascrive trasparenza e tema.

include ~/.config/kitty/kitty.conf

# --- Aspetto finestra ---
background_opacity 0.70
window_padding_width 16
hide_window_decorations yes
confirm_os_window_close 0

# --- Palette Tokyo Night (Storm), abbinata a nvim (tokyonight-storm) ---
background            #24283b
foreground            #c0caf5
selection_background  #2e3c64
selection_foreground  #c0caf5
cursor                #c0caf5
cursor_text_color     #24283b
url_color             #73daca

color0  #1d202f
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
