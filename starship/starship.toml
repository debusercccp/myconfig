# Layout del prompt estratto dal tuo starship.nix
format = "$time$username$hostname$directory$git_branch$line_break$character"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M:%S"
style = "bold bright-blue"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[line_break]
disabled = false

[username]
show_always = true
format = "[$user]($style) "
style_user = "bold purple"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold white"

[directory]
truncation_length = 3
format = "[$path]($style) "
style = "bold yellow"
home_symbol = "~"

[git_branch]
symbol = "git:"
format = "[$symbol$branch]($style) "
style = "bold cyan"

[git_status]
format = "([$all_status]($style) )"
style = "bold red"
ahead = "⇡${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
modified = "!"
staged = "+"

[rust]
symbol = " "
style = "bold red"

[python]
symbol = " "
pyenv_prefix = "venv "
