conky.config = {
    -- Forza l'output su Wayland escludendo X11
    out_to_x = false,
    out_to_wayland = true,

    -- Impostazioni finestra specifiche per Wayland (Layer Shell)
    own_window = true,
    own_window_type = 'desktop',
    own_window_role = 'topology',

    -- Trasparenza e stile Tokyo Night
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 195,
    own_window_colour = '#1a1b26',

    -- Dimensioni e posizione
    alignment = 'top_right',
    gap_x = 40,
    gap_y = 60,
    minimum_width = 320,
    minimum_height = 500,

    -- Prestazioni e Font
    update_interval = 1,
    double_buffer = true,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=10',

    -- Palette Colori
    text_color = '#a9b1d6',
    color1 = '#f7768e',
    color2 = '#bb9af7',
    color3 = '#7dcfff',
    color4 = '#9ece6a',
};

conky.text = [[
${font JetBrainsMono Nerd Font:size=38}${alignc}${color2}${time %H:%M}${font}${color}
${font JetBrainsMono Nerd Font:size=11}${alignc}${color3}${time %A %d %B %Y}${font}${color}
${hr 2}

${color3}󱎫 Uptime:${color} ${alignr}${uptime_short}

${color2} CPU${color} ${alignr}${cpu cpu0}%
${color1}${cpubar cpu1 6,70} ${cpubar cpu2 6,70} ${cpubar cpu3 6,70} ${cpubar cpu4 6,70}${color}

${color2} RAM${color} ${mem} / ${memmax} ${alignr}${memperc}%
${color1}${membar 8}${color}

${color3}󰹹 NETWORK:${color}
 ${downspeed} ${alignr} ${upspeed}
# Nota: rimosso il nome fisso dell'interfaccia per evitare bug se cambia da wlan0 a enp...

${color4}󰋊 STORAGE${color} ${alignr}${fs_used /} / ${fs_size /}
${color4}${fs_bar 8 /}${color}
]];
