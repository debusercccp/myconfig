conky.config = {
    -- Forza l'output su Wayland escludendo X11
    out_to_x = false,
    out_to_wayland = true,

    -- Impostazioni finestra specifiche per Wayland
    own_window = true,
    own_window_type = 'desktop',
    -- own_window_role rimosso perché rompe Wayland

    -- Suggerimenti per evitare decorazioni di finestre normali
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Trasparenza e stile Tokyo Night
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 195,
    own_window_colour = '#1a1b26',

    -- Dimensioni e posizione
    alignment = 'top_right',
    gap_x = 40,
    gap_y = 60,
    minimum_width = 320,
    minimum_height = 250,

    -- Prestazioni e Font
    update_interval = 1,
    double_buffer = true,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font:size=10',

    -- Palette Colori corretta per la nuova sintassi
    default_color = '#a9b1d6', -- Sostituito text_color con default_color
    color1 = '#f7768e',
    color2 = '#bb9af7',
    color3 = '#7dcfff',
    color4 = '#9ece6a',
};

conky.text = [[
# UPTIME (Ora è la prima riga in alto con l'icona orologio 󱎫)
${color3}󱎫 Uptime:${color} ${alignr}${uptime_short}

# CPU (Con icona microchip )
${color2} CPU${color} ${alignr}${cpu cpu0}%
${color1}${cpubar cpu1 6,70} ${cpubar cpu2 6,70} ${cpubar cpu3 6,70} ${cpubar cpu4 6,70}${color}

# RAM (Con icona memoria )
${color2} RAM${color} ${mem} / ${memmax} ${alignr}${memperc}%
${color1}${membar 8}${color}

# RETE (Con icone Download  e Upload )
${color3}󰹹 NETWORK:${color}
 ${downspeed} ${alignr} ${upspeed}

# DISCO (Con icona Hard Disk 󰋊)
${color4}󰋊 STORAGE${color} ${alignr}${fs_used /} / ${fs_size /}
${color4}${fs_bar 8 /}${color}
]];
